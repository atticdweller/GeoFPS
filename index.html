<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoFPS</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; position: fixed; top: 0; left: 0; z-index: 0; }

    /* Location picker */
    #picker {
      position: fixed; inset: 0; z-index: 200;
      display: flex; flex-direction: column;
      background: #1a1a2e;
    }
    #picker-header {
      padding: 16px 24px;
      background: #16213e;
      color: #fff; font-family: monospace;
      display: flex; align-items: center; justify-content: space-between;
    }
    #picker-header h1 { font-size: 24px; }
    #picker-header p { font-size: 14px; color: #aaa; }
    #picker-start {
      padding: 10px 24px;
      background: #4CAF50; color: #fff; border: none;
      font-size: 16px; font-family: monospace; cursor: pointer;
      border-radius: 4px;
    }
    #picker-start:disabled { background: #555; cursor: not-allowed; }
    #picker-start:not(:disabled):hover { background: #45a049; }
    #picker-map { flex: 1; }

    /* Loading screen */
    #loading {
      position: fixed; inset: 0; z-index: 150;
      background: #1a1a2e;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      color: #fff; font-family: monospace;
    }
    #loading h2 { font-size: 28px; margin-bottom: 24px; }
    #loading-status { font-size: 16px; color: #aaa; margin-bottom: 16px; }
    #loading-bar-outer {
      width: 300px; height: 8px; background: #333;
      border-radius: 4px; overflow: hidden;
    }
    #loading-bar-inner {
      height: 100%; background: #4CAF50; width: 0%;
      transition: width 0.3s;
    }

    /* Blocker */
    #blocker {
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: none; align-items: center; justify-content: center;
      z-index: 100;
    }
    #blocker .prompt {
      color: #fff; text-align: center; font-family: monospace;
    }
    #blocker .prompt h1 { font-size: 48px; margin-bottom: 16px; }
    #blocker .prompt p { font-size: 18px; color: #aaa; }

    /* HUD */
    #hud {
      position: fixed; inset: 0; pointer-events: none;
      font-family: monospace; color: #fff; z-index: 50;
      display: none;
    }
    #crosshair {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 24px; height: 24px;
    }
    #crosshair::before, #crosshair::after {
      content: ''; position: absolute; background: rgba(255, 255, 255, 0.8);
    }
    #crosshair::before {
      width: 2px; height: 24px; left: 50%; transform: translateX(-50%);
    }
    #crosshair::after {
      width: 24px; height: 2px; top: 50%; transform: translateY(-50%);
    }

    #health-bar {
      position: absolute; bottom: 24px; left: 24px;
    }
    #health-bar .label { font-size: 14px; margin-bottom: 4px; }
    #health-bar .bar {
      width: 200px; height: 12px; background: #333; border: 1px solid #666;
    }
    #health-bar .fill {
      height: 100%; background: #4f4; width: 100%;
      transition: width 0.2s;
    }

    #ammo-display {
      position: absolute; bottom: 24px; right: 24px;
      font-size: 24px;
    }

    #wave-display {
      position: absolute; top: 24px; right: 24px;
      font-size: 16px; text-align: right;
    }

    #hit-marker {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 20px; color: #f44; opacity: 0;
      transition: opacity 0.1s;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <!-- Location Picker -->
  <div id="picker">
    <div id="picker-header">
      <div>
        <h1>GeoFPS</h1>
        <p>Click the map to drop a pin, then start the game</p>
      </div>
      <button id="picker-start" disabled>Start Game</button>
    </div>
    <div id="picker-map"></div>
  </div>

  <!-- Loading Screen -->
  <div id="loading">
    <h2>Generating World...</h2>
    <div id="loading-status">Initializing...</div>
    <div id="loading-bar-outer"><div id="loading-bar-inner"></div></div>
  </div>

  <!-- Click-to-play blocker -->
  <div id="blocker">
    <div class="prompt">
      <h1>GeoFPS</h1>
      <p>Click to play</p>
      <p style="margin-top: 8px; font-size: 14px;">WASD to move &bull; Mouse to look &bull; Click to shoot &bull; Space to jump</p>
      <p style="margin-top: 4px; font-size: 14px;">` to toggle fly mode &bull; Q/E down/up &bull; Shift to sprint</p>
    </div>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div id="crosshair"></div>
    <div id="hit-marker">X</div>
    <div id="health-bar">
      <div class="label">HP</div>
      <div class="bar"><div class="fill" id="health-fill"></div></div>
    </div>
    <div id="ammo-display">30 / 30</div>
    <div id="wave-display">
      <div>Wave: 1</div>
      <div>Kills: 0</div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
